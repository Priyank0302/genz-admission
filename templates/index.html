<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict Admission</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif;
               max-width: 700px; margin: 40px auto; padding: 20px;
               background: #f5f5f7; color: #1d1d1f; }
        h1 { font-weight: 600; }
        form { background: white; padding: 30px; border-radius: 12px;
               box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        label { display: block; margin-top: 14px; font-size: 14px;
                font-weight: 500; }
        input, select { width: 100%; padding: 10px; margin-top: 4px;
                        border: 1px solid #d2d2d7; border-radius: 6px;
                        font-size: 14px; box-sizing: border-box; }
        button { margin-top: 24px; padding: 12px 28px; background: #0071e3;
                 color: white; border: none; border-radius: 8px;
                 font-size: 15px; font-weight: 500; cursor: pointer; }
        .result { margin-top: 24px; padding: 20px; background: white;
                  border-radius: 12px;
                  box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .verdict { font-size: 24px; font-weight: 600; }
        .admit { color: #22a06b; } .reject { color: #d70015; }
        .row { display: flex; gap: 16px; } .row > div { flex: 1; }
    </style>
</head>
<body>
    <h1>Predict Admission</h1>
    <form action="/predictdata" method="post">
        <div class="row">
            <div><label>Age</label>
                <input type="number" name="age" value="19" min="15" max="30" required></div>
            <div><label>Gender</label>
                <select name="gender" required>
                    <option>Male</option><option>Female</option>
                </select></div>
        </div>

        <label>State</label>
        <input type="text" name="state" value="California" required>

        <div class="row">
            <div><label>Family income ($)</label>
                <input type="number" name="family_income" value="75000" required></div>
            <div><label>High-school GPA</label>
                <input type="number" step="0.01" name="high_school_gpa" value="3.5" required></div>
        </div>

        <div class="row">
            <div><label>SAT score</label>
                <input type="number" name="sat_score" value="1200" required></div>
            <div><label>ACT score</label>
                <input type="number" name="act_score" value="25" required></div>
        </div>

        <div class="row">
            <div><label>Attendance rate (%)</label>
                <input type="number" step="0.1" name="attendance_rate" value="92" required></div>
            <div><label>AP courses</label>
                <input type="number" name="ap_courses" value="3" required></div>
        </div>

        <div class="row">
            <div><label>Extracurricular count</label>
                <input type="number" name="extracurricular_count" value="4" required></div>
            <div><label>Volunteer hours</label>
                <input type="number" name="volunteer_hours" value="90" required></div>
        </div>

        <div class="row">
            <div><label>Leadership positions</label>
                <input type="number" name="leadership_positions" value="1" required></div>
            <div><label>Coding projects</label>
                <input type="number" name="coding_projects" value="2" required></div>
        </div>

        <div class="row">
            <div><label>Social media hrs/day</label>
                <input type="number" step="0.1" name="social_media_hours" value="4.5" required></div>
            <div><label>Online certifications</label>
                <input type="number" name="online_certifications" value="2" required></div>
        </div>

        <div class="row">
            <div><label>Essay score</label>
                <input type="number" step="0.1" name="essay_score" value="75" required></div>
            <div><label>Recommendation score</label>
                <input type="number" step="0.1" name="recommendation_score" value="78" required></div>
        </div>

        <label>Interview score</label>
        <input type="number" step="0.1" name="interview_score" value="73" required>

        <button type="submit">Predict admission</button>
    </form>

    {% if prediction is not none %}
    <div class="result">
        <div class="verdict {% if prediction == 1 %}admit{% else %}reject{% endif %}">
            {% if prediction == 1 %}✓ Likely admitted{% else %}✗ Likely not admitted{% endif %}
        </div>
        <p>Admission probability: <strong>{{ probability }}%</strong></p>
    </div>
    {% endif %}
</body>
</html>
